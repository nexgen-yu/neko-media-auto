name: X（Twitter）自動投稿

on:
  workflow_dispatch: # 手動実行のみ（X API Basicプラン$100/月が必要なためcron停止中）

permissions:
  contents: write

jobs:
  x-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install tweepy anthropic beautifulsoup4 requests

      - name: X自動投稿（新記事3件まで）
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python x_auto_post.py --limit 3

      - name: 投稿済みIDをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x_posted_ids.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: x post record [$(date +%Y-%m-%d)]"
          git push || true
