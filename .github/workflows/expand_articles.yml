name: 薄い記事拡充

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜 JST 10:00

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic requests

      - name: 薄い記事を拡充（週5件まで）
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          MAX_ARTICLES: '5'
        run: python expand_thin_articles.py

      - name: 結果をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add expanded_ids.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: expanded thin articles [$(date +%Y-%m-%d)]"
          git push || true
