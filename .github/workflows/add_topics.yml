name: 新トピック追加（一回限り）

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-topics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 新トピック追加
        run: python add_new_topics.py
      - name: topics.jsonをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topics.json
          git diff --staged --quiet || git commit -m "feat: 競合分析由来の高優先度トピック10件追加（腸腎連関・IRIS等）"
          git push
